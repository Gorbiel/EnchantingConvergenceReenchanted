name: Bug Report
description: Report something not working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: mc_version
    attributes:
      label: Minecraft Version
      placeholder: 1.20.1
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: Mod Version
      placeholder: 1.0.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Do this
        2. Then this
        3. Crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash report
      description: Paste logs or attach file