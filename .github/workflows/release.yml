name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build release artifacts
        run: ./gradlew build sourcesJar --stacktrace

      - name: Collect release files
        run: |
          mkdir -p release-assets

          main_jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-dev*.jar' \
            ! -name '*-javadoc.jar' | head -n 1)"

          sources_jar="$(find build/libs -maxdepth 1 -type f -name '*-sources.jar' | head -n 1)"

          test -n "$main_jar"
          test -n "$sources_jar"

          cp "$main_jar" release-assets/
          cp "$sources_jar" release-assets/

          ls -la release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --generate-notes \
            --notes "$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"